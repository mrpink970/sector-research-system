<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum System Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f4f8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 1rem; color: #1a2a3a; }
        .dashboard { max-width: 1400px; margin: 0 auto; }
        .header { margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.8rem; font-weight: 700; color: #1a4d7a; }
        .kpi-grid { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
        .kpi-card { background: white; border-radius: 12px; padding: 1rem; flex: 1 1 160px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .kpi-label { font-size: 0.75rem; text-transform: uppercase; color: #666; }
        .kpi-value { font-size: 1.7rem; font-weight: 700; }
        .positive { color: #1e8a4c; }
        .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 1.2rem; }
        .card-header { padding: 1rem; font-weight: 600; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .card-content { padding: 1rem; }
        .ranking-table { width: 100%; border-collapse: collapse; }
        .ranking-table th, .ranking-table td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #eee; }
        .score-high { color: #1e8a4c; font-weight: bold; }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <h1>🔬 Quantum Computing System</h1>
        <p>7 Quantum Stocks • Single Position • 10% Trailing Stop</p>
    </div>

    <div class="kpi-grid" id="kpiContainer">Loading...</div>

    <div class="card">
        <div class="card-header">🏆 Rankings</div>
        <div class="card-content">
            <table class="ranking-table" id="rankingsBody"></table>
        </div>
    </div>

    <div class="card">
        <div class="card-header">📌 Current Position</div>
        <div class="card-content" id="positionCard">Loading position...</div>
    </div>

    <div class="last-updated" id="lastUpdated"></div>
</div>

<script>
    const BASE = 'https://raw.githubusercontent.com/mrpink970/sector-research-system/main/data/quantum/';
    const TICKERS = ['IONQ','QBTS','RGTI','QUBT','XNDU','INFQ','HQ'];

    async function fetchCSV(name) {
        try {
            const r = await fetch(BASE + name + '?t=' + Date.now());
            return r.ok ? await r.text() : '';
        } catch(e) { return ''; }
    }

    function parseLastLine(text) {
        if (!text) return null;
        const lines = text.trim().split('\n');
        if (lines.length < 2) return null;
        const headers = lines[0].split(',').map(h => h.trim());
        const vals = lines[lines.length-1].split(',').map(v => v.trim());
        const row = {};
        headers.forEach((h,i) => {
            const v = vals[i] || '';
            row[h] = (!isNaN(v) && v !== '') ? parseFloat(v) : v;
        });
        return row;
    }

    async function load() {
        const [prices, scores, pos] = await Promise.all([
            fetchCSV('prices.csv'),
            fetchCSV('scores.csv'),
            fetchCSV('positions.csv')
        ]);

        const priceRow = parseLastLine(prices);
        const scoreRow = parseLastLine(scores);
        const position = parseLastLine(pos);

        // Rankings
        let html = `<tr><th>Rank</th><th>Ticker</th><th>Close</th><th>Score</th></tr>`;
        TICKERS.map(t => ({
            t: t,
            p: priceRow ? priceRow[t] || 0 : 0,
            s: scoreRow ? scoreRow[t] || 0 : 0
        })).sort((a,b) => b.s - a.s).forEach((r,i) => {
            html += `<tr><td>${i+1}</td><td><b>${r.t}</b></td><td>$${r.p.toFixed(2)}</td><td class="${r.s>=8?'score-high':''}">${r.s}</td></tr>`;
        });
        document.getElementById('rankingsBody').innerHTML = html;

        // Position
        if (position && priceRow) {
            const entry = parseFloat(position.entry_price);
            const shares = parseInt(position.shares);
            const current = priceRow[position.ticker] || entry;
            const cost = (entry * shares).toFixed(2);
            document.getElementById('positionCard').innerHTML = `
                <div style="text-align:center; background:#f0fdf4; padding:1.5rem; border-radius:12px;">
                    <span style="background:#e0f5e8; padding:4px 12px; border-radius:20px;">${position.ticker}</span><br><br>
                    <div style="font-size:2.2rem; font-weight:700; color:#1e8a4c;">${((current/entry-1)*100).toFixed(1)}%</div>
                    <div>Entry $${entry} → $${current.toFixed(2)}</div>
                    <div>Shares: ${shares} | Cost: $${cost}</div>
                    <div>Remaining Cash: ~$9.71</div>
                </div>`;
        } else {
            document.getElementById('positionCard').innerHTML = "No open position";
        }

        document.getElementById('lastUpdated').innerHTML = `Last updated: ${new Date().toLocaleString()}`;
    }

    load();
    setInterval(load, 300000);
</script>
</body>
</html>
