<!DOCTYPE html>
<html>
<head>
    <title>Quantum Trades</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f0f4f8; }
        table { border-collapse: collapse; width: 100%; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>🔬 Quantum System - Closed Trades</h1>
    <div id="output">Loading...</div>

    <script>
        fetch('https://raw.githubusercontent.com/mrpink970/sector-research-system/main/data/quantum/trade_log.csv?t=' + Date.now())
            .then(response => response.text())
            .then(data => {
                const lines = data.trim().split('\n');
                let html = '<table><thead><tr>';
                const headers = lines[0].split(',');
                headers.forEach(h => html += `<th>${h}</th>`);
                html += '</tr></thead><tbody>';
                for (let i = 1; i < lines.length; i++) {
                    html += '<tr>';
                    const cells = lines[i].split(',');
                    cells.forEach(c => html += `<td>${c}</td>`);
                    html += '</tr>';
                }
                html += '</tbody></table>';
                document.getElementById('output').innerHTML = html;
            })
            .catch(error => {
                document.getElementById('output').innerHTML = 'Error: ' + error;
            });
    </script>
</body>
</html>
