name: Stock Discovery System

on:
  schedule:
    - cron: '30 22 * * *'   # 6:30 PM ET (DST)
    - cron: '30 23 * * *'   # 6:30 PM ET (Standard)
  workflow_dispatch:

jobs:
  run-stock-discovery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pandas pyyaml yfinance
      - name: Run stock discovery
        run: python scripts/stocks/run_stock_discovery.py
      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stocks/*.csv
          git commit -m "Stock discovery $(date '+%Y-%m-%d')" || exit 0
          git push
