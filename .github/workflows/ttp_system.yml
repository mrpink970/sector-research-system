name: TTP SOXX System

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 10:00 AM ET
    - cron: '0 17 * * 1-5'   # 1:00 PM ET
    - cron: '30 19 * * 1-5'  # 3:30 PM ET
  workflow_dispatch:

jobs:
  run_ttp_system:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pandas yfinance pyyaml
      
      - name: Create data directories
        run: |
          mkdir -p data/ttp
          mkdir -p data/ttp/cache
      
      - name: Restore earnings cache
        uses: actions/cache@v3
        with:
          path: data/ttp/cache
          key: ttp-earnings-cache-${{ github.run_id }}
          restore-keys: |
            ttp-earnings-cache-
      
      - name: Collect SOXX data
        run: python scripts/ttp/collect_data.py
      
      - name: Generate signal (with compliance checks)
        run: python scripts/ttp/generate_signal.py
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      
      - name: Show TTP evaluation status
        run: |
          python -c "
from scripts.ttp.trade_manager import print_review_status, get_performance_summary
print_review_status()
print()
print('PERFORMANCE SUMMARY')
print('=' * 50)
perf = get_performance_summary()
for k, v in perf.items():
    print(f'  {k}: {v}')
"
      
      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ttp/
          git add docs/ttp/
          git diff --staged --quiet || git commit -m "TTP system update $(date '+%Y-%m-%d %H:%M') - SOXX Green Day"
          git push
      
      - name: Upload data artifacts (for debugging)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ttp-system-data
          path: data/ttp/
          retention-days: 7
