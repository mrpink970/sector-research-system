name: TTP SOXX System

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 10:00 AM ET
    - cron: '0 17 * * 1-5'   # 1:00 PM ET
    - cron: '30 19 * * 1-5'  # 3:30 PM ET
  workflow_dispatch:

jobs:
  run_ttp_system:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas yfinance pyyaml
      
      - name: Create data directories
        run: mkdir -p data/ttp
      
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV
      
      - name: Run TTP System - Collect Data
        run: python scripts/ttp/collect_data.py
      
      - name: Run TTP System - Generate Signal
        run: python scripts/ttp/generate_signal.py
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      
      - name: Test email sending (debug)
        run: |
          python -c "
import smtplib
from email.message import EmailMessage
import os

mail_username = os.environ.get('MAIL_USERNAME')
mail_password = os.environ.get('MAIL_PASSWORD')

print(f'Username found: {bool(mail_username)}')
print(f'Password found: {bool(mail_password)}')

if not mail_username or not mail_password:
    print('❌ Email credentials not found in secrets')
    exit(1)

try:
    msg = EmailMessage()
    msg.set_content('TTP System test - workflow completed at $(date)')
    msg['Subject'] = 'TTP System Test'
    msg['From'] = mail_username
    msg['To'] = mail_username
    
    with smtplib.SMTP_SSL('smtp.gmail.com', 465) as smtp:
        smtp.login(mail_username, mail_password)
        smtp.send_message(msg)
    print('✅ Test email sent successfully to {mail_username}')
except Exception as e:
    print(f'❌ Failed to send test email: {e}')
    exit(1)
"
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      
      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ttp/
          git add docs/ttp/
          git diff --staged --quiet || git commit -m "TTP system update $(date '+%Y-%m-%d %H:%M')"
          git push
