name: TTP SOXX System

on:
  schedule:
    - cron: '30 12 * * 1-5'   # 8:30 AM ET
    - cron: '0 14 * * 1-5'    # 10:00 AM ET
    - cron: '0 17 * * 1-5'    # 1:00 PM ET
    - cron: '30 19 * * 1-5'   # 3:30 PM ET
  workflow_dispatch:

jobs:
  run_ttp_system:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pandas yfinance pyyaml
      
      - name: Create data directories
        run: mkdir -p data/ttp
      
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV
      
      - name: Collect SOXX data
        run: python scripts/ttp/collect_data.py
      
      - name: Generate signal
        run: python scripts/ttp/generate_signal.py
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      
      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase || true
          git add data/ttp/
          git add docs/ttp/
          git diff --staged --quiet || git commit -m "TTP system update $(date '+%Y-%m-%d %H:%M')"
          git push origin main
