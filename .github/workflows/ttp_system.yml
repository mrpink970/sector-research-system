name: TTP SOXX System

on:
  schedule:
    - cron: '0 14 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '30 19 * * 1-5'
  workflow_dispatch:

jobs:
  run_ttp_system:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pandas yfinance pyyaml
      - name: Create data directories
        run: mkdir -p data/ttp
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV
      - name: Collect SOXX data
        run: python scripts/ttp/collect_data.py
      - name: Generate signal
        run: python scripts/ttp/generate_signal.py
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ttp/
          git diff --staged --quiet || git commit -m "TTP update $(date '+%Y-%m-%d %H:%M')"
          git push
