name: MES Paper Trading System

on:
  schedule:
    - cron: '0 10-16 * * 1-5'   # Every hour from 10 AM to 4 PM ET
  workflow_dispatch:

jobs:
  run_mes_system:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install yfinance pandas numpy pyyaml
      
      - name: Create data directory
        run: mkdir -p data/mes_paper docs
      
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV
      
      - name: Run MES Paper Trading System
        run: python scripts/mes_paper_trade/system.py
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      
      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mes_paper/
          git diff --staged --quiet || git commit -m "MES paper trade update $(date '+%Y-%m-%d %H:%M')"
          git push
