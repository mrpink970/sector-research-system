name: Baby Bond Swing Analyzer

on:
  workflow_dispatch:

jobs:
  run-swing-analyzer:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy
      
      - name: Run swing analyzer
        run: |
          python scripts/bonds/swing_analyzer.py
      
      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/bonds/swing_analysis.csv data/bonds/swing_watchlist.csv
          git commit -m "Swing analysis $(date '+%Y-%m-%d')" || echo "No changes to commit"
          git push
