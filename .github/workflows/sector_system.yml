name: Sector Research System

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

jobs:
  update-sector-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pyyaml pandas

      - name: Collect market data
        run: python scripts/collect_market_data.py
        
      - name: Calculate indicators
        run: python scripts/calculate_indicators.py
        
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market_data.csv
          git add data/market_data.csv data/indicators.csv
          git commit -m "daily sector market data update" || echo "No changes to commit"
          git push
