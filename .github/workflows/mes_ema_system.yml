name: MES Monthly Income System

on:
  schedule:
    - cron: '0 10-16 * * 1-5'   # Every hour from 10 AM to 4 PM ET
  workflow_dispatch:

jobs:
  run_mes_ema:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install yfinance pandas
      
      - name: Run MES EMA System
        run: python scripts/mes_ema/signal_generator.py
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      
      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mes_ema/
          git diff --staged --quiet || git commit -m "MES EMA signal $(date '+%Y-%m-%d %H:%M')"
          git push
