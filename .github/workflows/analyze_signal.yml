name: Analyze Signal

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas pytz
      
      - name: Run signal analyzer
        run: python scripts/ttp/analyze_signal.py
        env:
          EMAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      
      - name: Commit and push updates (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ttp/market_data.csv
          git diff --staged --quiet || git commit -m "Signal analysis update $(date '+%Y-%m-%d %H:%M')"
          git push
