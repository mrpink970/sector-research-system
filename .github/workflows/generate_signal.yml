name: Generate Signal

on:
  schedule:
    - cron: '*/30 14-20 * * 1-5'   # Every 30 min (check for signals)
  workflow_dispatch:

jobs:
  generate_signal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pandas yfinance pyyaml
      
      - name: Generate signal
        run: python scripts/ttp/generate_signal.py
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      
      - name: Commit signal history
        run: |
          git config user.name "github-actions[bot]"
          git config.user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ttp/signals.csv
          git diff --staged --quiet || git commit -m "Signal update $(date '+%Y-%m-%d %H:%M')"
          git push
