name: Paper Trading System

on:
  schedule:
    - cron: '23 22 * * *'  # 6:23 PM ET (10:23 PM UTC during daylight savings)
  workflow_dispatch:        # Keep this for manual runs

jobs:
  run-paper-trading:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas pyyaml yfinance

      - name: Run paper trading system
        run: |
          python scripts/run_paper_trading.py

      - name: Commit outputs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/paper_positions.csv data/paper_trade_log.csv data/paper_performance.csv || echo "No files"
          git commit -m "Paper trading update $(date '+%Y-%m-%d %H:%M')" || echo "No changes"
          git push
