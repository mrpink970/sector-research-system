
name: Paper Trading System

on:
  schedule:
    - cron: '10 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-paper-trading:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          pip install pandas pyyaml

      - name: Run paper trading system
        run: |
          python scripts/run_paper_trading.py

      - name: Commit outputs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add paper_positions.csv paper_trade_log.csv paper_performance.csv || echo "No files"
          git commit -m "Paper trading update" || echo "No changes"
          git push
