name: TTP Weekly Cache Refresh

on:
  schedule:
    - cron: '0 12 * * 0'   # Sunday 8:00 AM ET
  workflow_dispatch:

jobs:
  refresh_cache:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pandas yfinance pyyaml
      
      - name: Create cache directory
        run: mkdir -p data/ttp/cache
      
      - name: Refresh earnings cache
        run: |
          python -c "
from scripts.ttp.compliance import get_earnings_dates
import yaml

with open('config/ttp_config.yaml', 'r') as f:
    config = yaml.safe_load(f)

symbols = config['compliance']['earnings_symbols']
print(f'Refreshing earnings for: {symbols}')
earnings = get_earnings_dates(symbols)
for sym, date in earnings.items():
    print(f'  {sym}: {date.date() if date else None}')
"
      
      - name: Commit cache updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ttp/cache/
          git diff --staged --quiet || git commit -m "Weekly earnings cache refresh $(date '+%Y-%m-%d')"
          git push
