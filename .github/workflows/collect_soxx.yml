name: Collect SOXX Data

on:
  schedule:
    # Every 15 minutes from 9:15 AM to 4:15 PM ET (13:15 to 20:15 UTC during EDT)
    # UTC hours: 13-20 covers 9 AM to 4 PM ET
    - cron: '*/15 13-20 * * 1-5'
  workflow_dispatch:

jobs:
  collect_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pandas yfinance pytz
      
      - name: Create data directory
        run: mkdir -p data/ttp
      
      - name: Collect SOXX data
        run: python scripts/ttp/collect_data.py
      
      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ttp/price_log.csv
          git diff --staged --quiet || git commit -m "SOXX data update $(date '+%Y-%m-%d %H:%M')"
          git push
