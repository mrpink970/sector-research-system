name: Stock Discovery & Trading System

on:
  schedule:
    - cron: '30 22 * * *'   # 6:30 PM ET (DST)
    - cron: '30 23 * * *'   # 6:30 PM ET (Standard)
  workflow_dispatch:

jobs:
  run-stock-system:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          pip install pandas pyyaml yfinance
      
      - name: Run stock discovery (scoring)
        run: |
          python scripts/stocks/run_stock_discovery.py
      
      - name: Run stock trading (paper execution)
        run: |
          python scripts/stocks/run_stock_trading.py
      
      - name: Generate stock dashboard
        run: |
          python scripts/stocks/generate_stock_dashboard.py
      
      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stocks/*.csv
          git add stock_dashboard.html
          git commit -m "Stock system update $(date '+%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
