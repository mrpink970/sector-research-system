name: Baby Bond Scanner

on:
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install yfinance pandas
      - name: Run scanner
        run: python scripts/baby_bond_scanner.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: baby-bond-data
          path: baby_bond_data_*.csv
