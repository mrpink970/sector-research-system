name: Bear Market Backtest

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  run_backtest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pandas yfinance matplotlib
      
      - name: Run bear backtest
        run: python scripts/bear_backtest.py
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bear-backtest-results
          path: |
            bear_backtest_results.png
            bear_trades.csv
