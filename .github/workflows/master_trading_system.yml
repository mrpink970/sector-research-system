name: Master Trading System

on:
  schedule:
    - cron: '0 22 * * 1-5'   # 6:00 PM ET Monday-Friday
  workflow_dispatch:

jobs:
  run_all_systems:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pandas openpyxl yfinance pyyaml --upgrade
      
      - name: Create data directories
        run: |
          mkdir -p data/4_etf
          mkdir -p data/stocks
          mkdir -p data/ai
          mkdir -p data/quantum
      
      # ============================================================
      # SECTOR SYSTEM DATA PIPELINE (FIXED)
      # ============================================================
      - name: Collect market data (sector ETFs)
        run: python scripts/collect_market_data.py
      
      - name: Calculate indicators
        run: python scripts/calculate_indicators.py
      
      - name: Score sectors
        run: python scripts/score_sectors.py
      
      - name: Rank sectors
        run: python scripts/rank_sectors.py
      
      # ============================================================
      # 1. UPDATE 2 ETF DATA (Fetch latest prices into Excel)
      # ============================================================
      - name: Update 2 ETF Data
        run: python scripts/4_etf/update_4etf_data.py
      
      # ============================================================
      # 2. RUN 2 ETF BULL SYSTEM
      # ============================================================
      - name: Run 2 ETF Bull System
        run: python scripts/4_etf/run_4etf_system.py
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
      
      # ============================================================
      # 3. RUN SECTOR SYSTEM (PAPER TRADING)
      # ============================================================
      - name: Run Sector System
        run: python scripts/run_paper_trading.py
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
      
      # ============================================================
      # 4. RUN STOCK SYSTEM
      # ============================================================
      - name: Run Stock System
        run: python scripts/stocks/run_stock_trading.py
      
      # ============================================================
      # 5. RUN AI SYSTEM
      # ============================================================
      - name: Run AI System
        run: python scripts/ai/run_ai_system.py
      
      # ============================================================
      # 6. RUN QUANTUM SYSTEM
      # ============================================================
      - name: Run Quantum System
        run: python scripts/quantum/run_quantum_system.py
      
      # ============================================================
      # 7. GENERATE DASHBOARDS
      # ============================================================
      - name: Generate Sector Dashboard
        run: python scripts/generate_dashboard.py
      
      # ============================================================
      # 8. RUN MONITORING ENGINE
      # ============================================================
      - name: Run Monitoring Engine
        run: python scripts/monitoring_engine.py
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      
      # ============================================================
      # 9. COMMIT AND PUSH UPDATES (INCLUDING DASHBOARDS)
      # ============================================================
      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git add docs/
          git add dashboard.html
          git add stock_dashboard.html
          git diff --staged --quiet || git commit -m "Master system update $(date '+%Y-%m-%d %H:%M')"
          git push
