name: Alpaca SOXL Signal

on:
  schedule:
    # Every 5 minutes from 9:00 AM to 4:15 PM ET (13:00 to 20:15 UTC during EDT)
    - cron: '*/5 13-20 * * 1-5'
  workflow_dispatch:

jobs:
  check_signal:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run Alpaca Signal Script
        run: python scripts/ttp/alpaca_signal.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          EMAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
