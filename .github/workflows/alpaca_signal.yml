name: Alpaca SOXL Signal

on:
  schedule:
    - cron: '*/5 13-20 * * 1-5'
  workflow_dispatch:

jobs:
  check_signal:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests
      
      - name: Run Alpaca Signal Script
        run: python scripts/ttp/alpaca_signal.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          EMAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      
      - name: Debug - Check if secrets are available (safe)
        run: |
          if [ -n "$ALPACA_API_KEY" ]; then echo "ALPACA_API_KEY is set"; else echo "ALPACA_API_KEY is NOT set"; fi
          if [ -n "$ALPACA_SECRET_KEY" ]; then echo "ALPACA_SECRET_KEY is set"; else echo "ALPACA_SECRET_KEY is NOT set"; fi
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      
      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ttp/soxl_candles.csv
          git diff --staged --quiet || git commit -m "Alpaca SOXL data update $(date '+%Y-%m-%d %H:%M')"
          git push
