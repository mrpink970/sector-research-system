name: Stock Discovery & Trading System

on:
  schedule:
    - cron: '0 0 * * *'    # 8:00 PM ET (DST: 12:00 AM UTC)
    - cron: '0 1 * * *'    # 8:00 PM ET (Standard: 1:00 AM UTC)
  workflow_dispatch:

jobs:
  run-stock-system:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          pip install pandas pyyaml yfinance
      
      - name: Run stock discovery (scoring)
        run: |
          python scripts/stocks/run_stock_discovery.py
      
      - name: Run stock trading (paper execution)
        run: |
          python scripts/stocks/run_stock_trading.py
      
      - name: Generate stock dashboard
        run: |
          python scripts/stocks/generate_stock_dashboard.py
      
      - name: Read performance data for email
        id: performance
        run: |
          # Extract latest performance data
          if [ -f "data/stocks/stock_performance.csv" ]; then
            TREND_BALANCE=$(python -c "import pandas as pd; df=pd.read_csv('data/stocks/stock_performance.csv'); print(df[df['system']=='trend']['balance'].iloc[0] if not df[df['system']=='trend'].empty else '1000')")
            BREAKOUT_BALANCE=$(python -c "import pandas as pd; df=pd.read_csv('data/stocks/stock_performance.csv'); print(df[df['system']=='breakout']['balance'].iloc[0] if not df[df['system']=='breakout'].empty else '1000')")
            TOTAL_TRADES=$(python -c "import pandas as pd; df=pd.read_csv('data/stocks/stock_performance.csv'); print(df['total_trades'].sum() if not df.empty else '0')")
          else
            TREND_BALANCE="1000"
            BREAKOUT_BALANCE="1000"
            TOTAL_TRADES="0"
          fi
          echo "trend_balance=${TREND_BALANCE}" >> $GITHUB_OUTPUT
          echo "breakout_balance=${BREAKOUT_BALANCE}" >> $GITHUB_OUTPUT
          echo "total_trades=${TOTAL_TRADES}" >> $GITHUB_OUTPUT
      
      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stocks/*.csv
          git add stock_dashboard.html
          git commit -m "Stock system update $(date '+%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
      
      - name: Send email with dashboard link
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_FROM }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: Stock Dashboard <${{ secrets.EMAIL_FROM }}>
          subject: "📊 Stock Dashboard Update - $(date '+%Y-%m-%d')"
          body: |
            Stock Discovery & Trading Dashboard has been updated.
            
            View Dashboard:
            https://mrpink970.github.io/sector-research-system/stock_dashboard.html
            
            Summary:
            - Trend Balance: ${{ steps.performance.outputs.trend_balance }}
            - Breakout Balance: ${{ steps.performance.outputs.breakout_balance }}
            - Total Trades: ${{ steps.performance.outputs.total_trades }}
            
            Last Run:
            - Check the dashboard for full details
            
            ---
            Automated message from GitHub Actions.
