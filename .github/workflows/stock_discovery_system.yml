name: Stock Discovery System

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-stock-discovery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          pip install yfinance pandas pyyaml numpy

      - name: Run stock discovery system
        run: |
          python scripts/stocks/run_stock_discovery.py

      - name: Commit outputs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/stocks/stock_scores_history.csv data/stocks/stock_candidates_history.csv data/stocks/stock_system_run_log.csv data/stocks/benchmark_history.csv || echo "No files"
          git commit -m "Stock discovery update" || echo "No changes"
          git push || echo "Nothing to push"
