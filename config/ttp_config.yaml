# Trade The Pool - SOXX Green Day System
# Account: $2,000 FLEX Swing
# Target: $300 profit (15%)

system:
  name: "SOXX Green Day System"
  instrument: "SOXX"
  shares: 2
  account_size: 2000
  profit_target: 300
  daily_loss_limit: 60
  max_drawdown: 140

entry_conditions:
  min_1h_return: 0.5  # percent
  rsi_min: 50
  above_ma20: true

exit_rules:
  stop_loss_pct: 2.0
  take_profit_pct: 6.0
  trailing_stop_pct: 2.0
  trailing_activation_pct: 3.0
  max_profit_per_trade: 150   # HARD STOP - 50% of $300 target

trade_management:
  shares_per_trade: 2
  min_trades_to_pass: 5

commission:
  per_share: 0.005
  min_per_order: 0.75

# TTP Compliance Checks (FLEX Swing specific)
compliance:
  earnings_restricted_days: 1
  earnings_symbols:
    - "NVDA"
    - "AMD"
    - "INTC"
    - "QCOM"
    - "TSM"
    - "MU"
    - "ADI"
    - "LRCX"
    - "AMAT"
    - "KLAC"

