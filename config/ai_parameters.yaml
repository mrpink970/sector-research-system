# AI Specific System Configuration
name: "AI Hardware Focus System"
display_name: "AI System"
start_date: "2026-05-11"
starting_balance: 5000

# Universe of AI-focused assets (SOXL excluded)
universe:
  - ticker: "AIBU"
    name: "2x AI & Big Data Bull"
    leverage: 2
    stop_type: "stepped"
  - ticker: "UBOT"
    name: "2x Robotics & AI Bull"
    leverage: 2
    stop_type: "stepped"
  - ticker: "NVDU"
    name: "1.5x NVDA Bull"
    leverage: 1.5
    stop_type: "stepped"
  - ticker: "MSFU"
    name: "1.5x MSFT Bull"
    leverage: 1.5
    stop_type: "stepped"
  - ticker: "GGLL"
    name: "1.5x GOOGL Bull"
    leverage: 1.5
    stop_type: "stepped"
  - ticker: "DRAM"
    name: "Memory ETF"
    leverage: 1
    stop_type: "stepped"
  - ticker: "CHAT"
    name: "Generative AI ETF"
    leverage: 1
    stop_type: "stepped"
  - ticker: "ARTY"
    name: "Future AI & Tech ETF"
    leverage: 1
    stop_type: "stepped"

# Trading parameters
position_limit: 1
position_size_pct: 1.0  # 100% of cash per position
min_score: 2.0
min_hold_days: 0

# Exit rules
exit_rules:
  trailing_stop_3x: 0.12  # Fixed 12% for 3x
  trailing_stop_stepped:
    initial: 0.12
    tighten_at: [0.10, 0.20, 0.40]
    tighten_to: [0.10, 0.08, 0.06]
  score_exit: 2.0

# Regime filter
regime_filter: true
qqq_ma_period: 50

# Dashboard
dashboard_url: "https://mrpink970.github.io/sector-research-system/docs/ai/ai_dashboard.html"

# Data files
data_files:
  performance: "data/ai/performance.csv"
  positions: "data/ai/positions.csv"
  trade_log: "data/ai/trade_log.csv"
  scores: "data/ai/scores.csv"
