# Updated paper trading parameters with risk management improvements
# Based on analysis of exp03 trade data

positions:
  max_concurrent_positions: 3              # Increased from 2
  # Removed shares_per_trade - now using risk-based sizing

risk:
  # Risk per trade as percentage of account value
  risk_per_trade_pct: 2.0                  # 2% of account per trade
  
  # Hard stops (active immediately at entry)
  hard_stop:
    leverage_3x_pct: 9.0                   # Down from 18%
    leverage_2x_pct: 7.0                   # Down from 14%
    leverage_1x_pct: 5.0                   # Down from 10%
  
  # Trailing stop (activates after profit threshold)
  trailing_stop:
    activation_pct: 5.0                    # Start trailing after 5% gain
    distance_pct: 3.0                      # Trail by 3% from peak

entry:
  min_score_threshold: 50.0                # NEW: Filter out low-quality signals
  required_consecutive_closes: 2           # Keep existing
  excluded_sectors:                        # NEW: Sectors to avoid
    - Utilities
  
  # Strong Bull gets larger position size
  strong_bull_multiplier: 1.5              # 50% larger than Bull positions

market_filter:
  enabled: true                            # NEW: Market regime filter
  benchmark: SPY
  ma_period: 50
  require_above_ma: true

# Keep existing sections
confirmation:
  required_consecutive_closes: 2

direction:
  non_tradable_state: Neutral

logging:
  skip_placeholder_mappings: true
